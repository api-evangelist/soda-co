aid: soda-co
name: Soda
description: >
  Soda is an AI-native, fully automated data quality platform that helps data
  engineering and analytics teams define data quality checks, scan datasets,
  monitor data freshness, and manage data quality incidents. The Soda Cloud
  REST API enables programmatic access to trigger scans, retrieve check results,
  manage incidents, and integrate data quality workflows into CI/CD pipelines
  and data stacks. Soda supports dozens of data sources including Snowflake,
  BigQuery, Databricks, PostgreSQL, and DuckDB.
